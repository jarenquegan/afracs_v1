<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Rounded background -->
  <rect width="40" height="40" rx="10" fill="#D4B356"/>
  <!-- Face outline circle -->
  <circle cx="20" cy="20" r="11" stroke="#350200" stroke-width="2" fill="none"/>
  <!-- Scan line top-left corner -->
  <path d="M9 14 L9 9 L14 9" stroke="#350200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan line top-right corner -->
  <path d="M26 9 L31 9 L31 14" stroke="#350200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan line bottom-left corner -->
  <path d="M9 26 L9 31 L14 31" stroke="#350200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan line bottom-right corner -->
  <path d="M26 31 L31 31 L31 26" stroke="#350200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes -->
  <circle cx="16" cy="19" r="1.5" fill="#350200"/>
  <circle cx="24" cy="19" r="1.5" fill="#350200"/>
  <!-- Smile -->
  <path d="M16 24 Q20 27 24 24" stroke="#350200" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>
